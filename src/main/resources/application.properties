spring.application.name=pr-intelligence-platform
server.port=8081

spring.datasource.url=${DB_URL:jdbc:h2:mem:pr_intelligence_platform;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

management.endpoints.web.exposure.include=health,info,metrics

pr.intelligence.github.mode=${GITHUB_MODE:stub}
pr.intelligence.ai.provider=${AI_PROVIDER:deterministic}
pr.intelligence.vector.mode=${VECTOR_MODE:memory}

spring.ai.model.chat=${SPRING_AI_CHAT_MODEL:none}
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.moderation=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.2
